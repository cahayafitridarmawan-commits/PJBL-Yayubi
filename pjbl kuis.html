<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soal Kuis</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at top left, #c0392b 0%, #8b1a00 30%, #3d0a00 60%, #b8860b 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: radial-gradient(ellipse at top left, #c0392b 0%, #8b1a00 30%, #3d0a00 60%, #b8860b 100%);
      border-radius: 18px;
      padding: 20px 20px 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 16px;
    }

    /* Nomor soal */
    .nomor-bar {
      background: #e8e4e0;
      border-radius: 14px;
      padding: 14px 24px;
      text-align: center;
    }

    .nomor-bar span {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 900;
      color: #5a0a0a;
    }

    /* Kotak soal */
    .soal-box {
      background: #e8e4e0;
      border-radius: 16px;
      padding: 20px 24px;
      min-height: 130px;
    }

    .soal-box p {
      font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      color: #5a0a0a;
      font-weight: 500;
      line-height: 1.6;
    }

    /* Pilihan jawaban */
    .pilihan {
      background: #e8e4e0;
      border-radius: 50px;
      padding: 16px 24px;
      font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      font-weight: 600;
      color: #5a0a0a;
      cursor: pointer;
      border: none;
      text-align: left;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
    }

    .pilihan:hover {
      background: #d8d4d0;
      transform: scale(1.01);
    }

    .pilihan:active {
      transform: scale(0.99);
    }

    /* Tombol Buat */
    .btn-buat-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-buat {
      background: #e8e4e0;
      border: none;
      border-radius: 30px;
      padding: 14px 38px;
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 900;
      color: #4a0a0a;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-buat:hover {
      background: #d8d4d0;
      transform: scale(1.03);
    }

    .btn-buat:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      .container {
        padding: 14px 12px 20px 12px;
        gap: 10px;
      }

      .soal-box {
        min-height: 100px;
        padding: 16px 16px;
      }

      .pilihan {
        padding: 14px 18px;
      }

      .btn-buat {
        padding: 12px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Nomor Soal -->
    <div class="nomor-bar">
      <span>10</span>
    </div>

    <!-- Kotak Soal -->
    <div class="soal-box">
      <p>Tulis soal...</p>
    </div>

    <!-- Pilihan A -->
    <button class="pilihan">A.</button>

    <!-- Pilihan B -->
    <button class="pilihan">B.</button>

    <!-- Pilihan C -->
    <button class="pilihan">C.</button>

    <!-- Pilihan D -->
    <button class="pilihan">D.</button>

    <!-- Tombol Buat -->
    <div class="btn-buat-wrap">
      <button class="btn-buat">Buat</button>
    </div>

  </div>
</body>
</html>
